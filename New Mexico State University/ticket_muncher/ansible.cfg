[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = False
timeout             = 30

[ssh_connection]
pipelining          = True
ssh_args            = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[inventory]
# Suppress warnings when hosts.yml doesn't exist yet (pre-recon)
ignore_errors       = true